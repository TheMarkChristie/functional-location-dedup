name: Publish PPTB tool to npm

# Builds the PPTB dist (dark single-file HTML + icon) and publishes to npm.
# Uses an npm Automation token (bypasses 2FA) stored as the repo secret NPM_TOKEN.

on:
  workflow_dispatch:        # run manually from the Actions tab
  release:
    types: [published]      # ...or when a GitHub Release is published

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Build dist (dark)
        working-directory: pptb
        run: node build.js

      - name: Publish to npm
        working-directory: pptb
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM }}
